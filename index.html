<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能任务排程工具</title>
  <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/1.7.0/cloudbase.full.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --sidebar: #1e293b;
      --card: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      padding: 24px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo svg { width: 28px; height: 28px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    .nav-item:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }
    .nav-item.active {
      background: var(--primary);
      color: white;
    }
    .nav-item svg { width: 20px; height: 20px; }
    .main {
      flex: 1;
      padding: 24px;
      overflow: auto;
    }
    .page { display: none; }
    .page.active { display: block; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header h1 { font-size: 28px; font-weight: 600; }
    .header .status {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }
    .header .status.disconnected {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      background: var(--primary);
      color: white;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn-secondary {
      background: #334155;
      color: var(--text);
    }
    .btn-secondary:hover { background: #475569; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .stat-card .label { color: var(--text-muted); font-size: 14px; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .column {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .column-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .column-header h3 { font-size: 14px; font-weight: 600; }
    .column-header .count {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
    .tasks { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
    .task-card {
      background: var(--bg);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .task-card:hover { border-color: var(--primary); }
    .task-card .title { font-weight: 500; margin-bottom: 8px; }
    .task-card .meta {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .task-card .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .task-card:hover .actions { opacity: 1; }
    .task-card .actions button {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      background: #334155;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .task-card .actions button:hover { background: #475569; }
    .priority {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .priority.high { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .priority.medium { background: rgba(249, 115, 22, 0.1); color: #f97316; }
    .priority.low { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      width: 500px;
      max-width: 90%;
      max-height: 90vh;
      overflow: hidden;
    }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 { font-size: 18px; }
    .modal-header button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
    }
    .modal-header button:hover { background: #334155; }
    .modal-body {
      padding: 24px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .team-card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .team-card .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 24px;
      font-weight: 700;
    }
    .team-card .name { font-weight: 600; margin-bottom: 4px; }
    .team-card .role { color: var(--text-muted); font-size: 14px; }
    .team-card .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .team-card .actions button {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      background: #334155;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .team-card .actions button:hover { background: #475569; }
    @media (max-width: 1024px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .board { grid-template-columns: repeat(2, 1fr); }
      .team-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .sidebar { width: 100%; }
      .app { flex-direction: column; }
      .stats { grid-template-columns: 1fr; }
      .board { grid-template-columns: 1fr; }
      .team-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        智能任务排程
      </div>
      <div id="nav-kanban" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        看板
      </div>
      <div id="nav-team" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        团队
      </div>
    </aside>

    <main class="main">
      <div id="kanban" class="page active">
        <div class="header">
          <h1>任务看板</h1>
          <div style="display: flex; align-items: center; gap: 16px;">
            <span id="db-status" class="status disconnected">连接中...</span>
            <button id="btn-new-task" class="btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              新建任务
            </button>
          </div>
        </div>
        <div class="stats">
          <div class="stat-card"><div class="value" id="stat-todo">0</div><div class="label">待处理任务</div></div>
          <div class="stat-card"><div class="value" id="stat-completed">0</div><div class="label">已完成</div></div>
          <div class="stat-card"><div class="value" id="stat-progress">0</div><div class="label">进行中</div></div>
          <div class="stat-card"><div class="value" id="stat-members">0</div><div class="label">团队成员</div></div>
        </div>
        <div class="board">
          <div class="column">
            <div class="column-header"><h3>待处理</h3><span class="count" id="count-todo">0</span></div>
            <div class="tasks" id="tasks-todo"></div>
          </div>
          <div class="column">
            <div class="column-header"><h3>进行中</h3><span class="count" id="count-progress">0</span></div>
            <div class="tasks" id="tasks-progress"></div>
          </div>
          <div class="column">
            <div class="column-header"><h3>已完成</h3><span class="count" id="count-completed">0</span></div>
            <div class="tasks" id="tasks-completed"></div>
          </div>
        </div>
      </div>

      <div id="team" class="page">
        <div class="header">
          <h1>团队管理</h1>
          <button id="btn-invite-member" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M12 4v16m8-8H4"></path>
            </svg>
            邀请成员
          </button>
        </div>
        <div class="team-grid" id="team-grid"></div>
      </div>
    </main>
  </div>

  <div id="modal-task" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>新建任务</h2>
        <button onclick="closeModal('modal-task')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>任务标题</label>
          <input type="text" placeholder="请输入任务标题" id="task-title">
        </div>
        <div class="form-group">
          <label>任务描述</label>
          <textarea placeholder="请输入任务描述" id="task-desc"></textarea>
        </div>
        <div class="form-group">
          <label>优先级</label>
          <select id="task-priority">
            <option value="high">高优先级</option>
            <option value="medium">中优先级</option>
            <option value="low">低优先级</option>
          </select>
        </div>
        <div class="form-group">
          <label>负责人</label>
          <select id="task-assignee"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-task')">取消</button>
        <button class="btn" onclick="createTask()">创建任务</button>
      </div>
    </div>
  </div>

  <div id="modal-invite" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>邀请成员</h2>
        <button onclick="closeModal('modal-invite')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" placeholder="请输入姓名" id="member-name">
        </div>
        <div class="form-group">
          <label>角色</label>
          <select id="member-role">
            <option value="frontend">前端开发</option>
            <option value="backend">后端开发</option>
            <option value="design">UI设计师</option>
            <option value="product">产品经理</option>
            <option value="test">测试工程师</option>
            <option value="ops">运维工程师</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-invite')">取消</button>
        <button class="btn" onclick="createMember()">创建成员</button>
      </div>
    </div>
  </div>

  <script>
    const ENV_ID = 'test111-5gj0t9riba9c312c';
    let db = null;
    let tasks = [];
    let members = [];

    async function initCloudBase() {
      try {
        const app = window.cloudbase.init({
          env: ENV_ID
        });
        await app.auth({
          persistence: 'local'
        }).signInAnonymously();
        db = app.database();
        document.getElementById('db-status').textContent = '已连接';
        document.getElementById('db-status').classList.remove('disconnected');
        await loadData();
      } catch (error) {
        console.error('数据库连接失败:', error);
        document.getElementById('db-status').textContent = '连接失败';
        loadMockData();
      }
    }

    async function loadData() {
      try {
        const [tasksRes, membersRes] = await Promise.all([
          db.collection('tasks').get(),
          db.collection('members').get()
        ]);
        tasks = tasksRes.data;
        members = membersRes.data;
        renderTasks();
        renderMembers();
        updateStats();
        updateAssigneeOptions();
      } catch (error) {
        console.error('加载数据失败:', error);
        loadMockData();
      }
    }

    function loadMockData() {
      tasks = [
        { _id: '1', title: '设计系统架构', description: '完成系统整体架构设计', priority: 'high', status: 'todo', assigneeId: '1', createdAt: new Date().toISOString() },
        { _id: '2', title: '编写API文档', description: '编写接口文档', priority: 'medium', status: 'todo', assigneeId: '2', createdAt: new Date().toISOString() },
        { _id: '3', title: '数据库设计', description: '设计数据库表结构', priority: 'high', status: 'todo', assigneeId: '3', createdAt: new Date().toISOString() },
        { _id: '4', title: '前端页面开发', description: '开发首页和看板页面', priority: 'medium', status: 'progress', assigneeId: '1', createdAt: new Date().toISOString() },
        { _id: '5', title: '后端接口开发', description: '开发RESTful API', priority: 'high', status: 'progress', assigneeId: '2', createdAt: new Date().toISOString() },
        { _id: '6', title: '需求分析', description: '完成需求分析文档', priority: 'low', status: 'completed', assigneeId: '3', createdAt: new Date().toISOString() },
        { _id: '7', title: '项目初始化', description: '初始化项目环境', priority: 'medium', status: 'completed', assigneeId: '1', createdAt: new Date().toISOString() },
      ];
      members = [
        { _id: '1', name: '张三', role: '前端开发', createdAt: new Date().toISOString() },
        { _id: '2', name: '李四', role: '后端开发', createdAt: new Date().toISOString() },
        { _id: '3', name: '王五', role: 'UI设计师', createdAt: new Date().toISOString() },
        { _id: '4', name: '赵六', role: '产品经理', createdAt: new Date().toISOString() },
        { _id: '5', name: '钱七', role: '测试工程师', createdAt: new Date().toISOString() },
        { _id: '6', name: '孙八', role: '运维工程师', createdAt: new Date().toISOString() },
      ];
      renderTasks();
      renderMembers();
      updateStats();
      updateAssigneeOptions();
    }

    function renderTasks() {
      const todoTasks = tasks.filter(t => t.status === 'todo');
      const progressTasks = tasks.filter(t => t.status === 'progress');
      const completedTasks = tasks.filter(t => t.status === 'completed');

      document.getElementById('tasks-todo').innerHTML = todoTasks.map(t => renderTaskCard(t)).join('');
      document.getElementById('tasks-progress').innerHTML = progressTasks.map(t => renderTaskCard(t)).join('');
      document.getElementById('tasks-completed').innerHTML = completedTasks.map(t => renderTaskCard(t)).join('');

      document.getElementById('count-todo').textContent = todoTasks.length;
      document.getElementById('count-progress').textContent = progressTasks.length;
      document.getElementById('count-completed').textContent = completedTasks.length;
    }

    function renderTaskCard(task) {
      const member = members.find(m => m._id === task.assigneeId);
      return `
        <div class="task-card" data-id="${task._id}">
          <div class="title">${task.title}</div>
          <div class="meta">
            <span class="priority ${task.priority}">${getPriorityLabel(task.priority)}</span>
            <span>${member?.name || '未分配'}</span>
          </div>
          <div class="actions">
            <button onclick="updateTaskStatus('${task._id}', '${getNextStatus(task.status)}')">${getStatusButtonLabel(task.status)}</button>
            <button onclick="deleteTask('${task._id}')">删除</button>
          </div>
        </div>
      `;
    }

    function getPriorityLabel(priority) {
      const labels = { high: '高', medium: '中', low: '低' };
      return labels[priority] || priority;
    }

    function getNextStatus(status) {
      const next = { todo: 'progress', progress: 'completed', completed: 'todo' };
      return next[status] || 'todo';
    }

    function getStatusButtonLabel(status) {
      const labels = { todo: '开始', progress: '完成', completed: '重置' };
      return labels[status] || '操作';
    }

    function renderMembers() {
      document.getElementById('team-grid').innerHTML = members.map(m => `
        <div class="team-card" data-id="${m._id}">
          <div class="avatar">${m.name.charAt(0)}</div>
          <div class="name">${m.name}</div>
          <div class="role">${getRoleLabel(m.role)}</div>
          <div class="actions">
            <button onclick="deleteMember('${m._id}')">删除</button>
          </div>
        </div>
      `).join('');
    }

    function getRoleLabel(role) {
      const labels = {
        frontend: '前端开发', backend: '后端开发', design: 'UI设计师',
        product: '产品经理', test: '测试工程师', ops: '运维工程师'
      };
      return labels[role] || role;
    }

    function updateStats() {
      document.getElementById('stat-todo').textContent = tasks.filter(t => t.status === 'todo').length;
      document.getElementById('stat-completed').textContent = tasks.filter(t => t.status === 'completed').length;
      document.getElementById('stat-progress').textContent = tasks.filter(t => t.status === 'progress').length;
      document.getElementById('stat-members').textContent = members.length;
    }

    function updateAssigneeOptions() {
      const select = document.getElementById('task-assignee');
      select.innerHTML = members.map(m => `<option value="${m._id}">${m.name}</option>`).join('');
    }

    async function createTask() {
      const title = document.getElementById('task-title').value;
      const description = document.getElementById('task-desc').value;
      const priority = document.getElementById('task-priority').value;
      const assigneeId = document.getElementById('task-assignee').value;

      if (!title.trim()) {
        alert('请输入任务标题');
        return;
      }

      try {
        const newTask = {
          title,
          description,
          priority,
          assigneeId,
          status: 'todo',
          createdAt: new Date().toISOString()
        };

        if (db) {
          const res = await db.collection('tasks').add(newTask);
          newTask._id = res._id;
        } else {
          newTask._id = Date.now().toString();
        }

        tasks.push(newTask);
        renderTasks();
        updateStats();
        closeModal('modal-task');
        document.getElementById('task-title').value = '';
        document.getElementById('task-desc').value = '';
        alert('任务创建成功！');
      } catch (error) {
        console.error('创建任务失败:', error);
        alert('创建任务失败，请重试');
      }
    }

    async function updateTaskStatus(id, newStatus) {
      try {
        const task = tasks.find(t => t._id === id);
        if (!task) return;

        task.status = newStatus;

        if (db) {
          await db.collection('tasks').doc(id).update({ status: newStatus });
        }

        renderTasks();
        updateStats();
      } catch (error) {
        console.error('更新任务失败:', error);
        alert('更新任务失败，请重试');
      }
    }

    async function deleteTask(id) {
      if (!confirm('确定要删除这个任务吗？')) return;

      try {
        if (db) {
          await db.collection('tasks').doc(id).remove();
        }

        tasks = tasks.filter(t => t._id !== id);
        renderTasks();
        updateStats();
        alert('任务删除成功！');
      } catch (error) {
        console.error('删除任务失败:', error);
        alert('删除任务失败，请重试');
      }
    }

    async function createMember() {
      const name = document.getElementById('member-name').value;
      const role = document.getElementById('member-role').value;

      if (!name.trim()) {
        alert('请输入姓名');
        return;
      }

      try {
        const newMember = {
          name,
          role,
          createdAt: new Date().toISOString()
        };

        if (db) {
          const res = await db.collection('members').add(newMember);
          newMember._id = res._id;
        } else {
          newMember._id = Date.now().toString();
        }

        members.push(newMember);
        renderMembers();
        updateStats();
        updateAssigneeOptions();
        closeModal('modal-invite');
        document.getElementById('member-name').value = '';
        alert('成员创建成功！');
      } catch (error) {
        console.error('创建成员失败:', error);
        alert('创建成员失败，请重试');
      }
    }

    async function deleteMember(id) {
      if (!confirm('确定要删除这个成员吗？')) return;

      try {
        if (db) {
          await db.collection('members').doc(id).remove();
        }

        members = members.filter(m => m._id !== id);
        tasks.forEach(t => {
          if (t.assigneeId === id) {
            t.assigneeId = null;
          }
        });

        renderMembers();
        renderTasks();
        updateStats();
        updateAssigneeOptions();
        alert('成员删除成功！');
      } catch (error) {
        console.error('删除成员失败:', error);
        alert('删除成员失败，请重试');
      }
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      document.getElementById('nav-' + pageId).classList.add('active');
    }

    function openModal(modalId) {
      document.getElementById(modalId).classList.add('show');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('show');
    }

    document.getElementById('nav-kanban').onclick = () => showPage('kanban');
    document.getElementById('nav-team').onclick = () => showPage('team');
    document.getElementById('btn-new-task').onclick = () => openModal('modal-task');
    document.getElementById('btn-invite-member').onclick = () => openModal('modal-invite');

    document.querySelectorAll('.modal-overlay').forEach(modal => {
      modal.addEventListener('click', function(e) {
        if (e.target === this) {
          this.classList.remove('show');
        }
      });
    });

    window.addEventListener('DOMContentLoaded', initCloudBase);
  </script>
</body>
</html>
