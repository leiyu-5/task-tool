<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能任务排程工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #f1f5f9;
      --bg: #0f172a;
      --sidebar: #1e293b;
      --card: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo svg { width: 28px; height: 28px; }
    .nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav a:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--text);
    }
    .nav a.active {
      background: var(--primary);
      color: white;
    }
    .nav svg { width: 20px; height: 20px; }
    .main {
      flex: 1;
      padding: 24px;
      overflow: auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header h1 { font-size: 28px; font-weight: 600; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stat-card .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .stat-card .icon.blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    .stat-card .icon.green { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .stat-card .icon.orange { background: rgba(249, 115, 22, 0.1); color: #f97316; }
    .stat-card .icon.purple { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .stat-card .label { color: var(--text-muted); font-size: 14px; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .column {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .column-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .column-header h3 { font-size: 14px; font-weight: 600; }
    .column-header .count {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .tasks {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .task-card {
      background: var(--bg);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .task-card:hover { border-color: var(--primary); }
    .task-card .title { font-weight: 500; margin-bottom: 8px; }
    .task-card .meta {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .priority {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .priority.high { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .priority.medium { background: rgba(249, 115, 22, 0.1); color: #f97316; }
    .priority.low { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      display: none;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      width: 500px;
      max-width: 90%;
      max-height: 90vh;
      overflow: hidden;
    }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 { font-size: 18px; }
    .modal-header button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
    }
    .modal-header button:hover { background: var(--secondary); }
    .modal-body {
      padding: 24px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .btn-secondary {
      background: var(--secondary);
      color: var(--text);
    }
    .btn-secondary:hover { background: rgba(241, 245, 249, 0.2); }
    @media (max-width: 1024px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .board { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .sidebar { width: 100%; padding: 16px; }
      .app { flex-direction: column; }
      .stats { grid-template-columns: 1fr; }
      .board { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        智能任务排程
      </div>
      <nav class="nav">
        <a href="#" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          看板
        </a>
        <a href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          报表
        </a>
        <a href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          团队
        </a>
        <a href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          设置
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="header">
        <h1>任务看板</h1>
        <div class="header-right">
          <button class="btn btn-primary" onclick="openModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            新建任务
          </button>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="value">12</div>
          <div class="label">待处理任务</div>
        </div>
        <div class="stat-card">
          <div class="icon green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <div class="value">8</div>
          <div class="label">已完成</div>
        </div>
        <div class="stat-card">
          <div class="icon orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="value">5</div>
          <div class="label">进行中</div>
        </div>
        <div class="stat-card">
          <div class="icon purple">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
            </svg>
          </div>
          <div class="value">6</div>
          <div class="label">团队成员</div>
        </div>
      </div>

      <div class="board">
        <div class="column">
          <div class="column-header">
            <h3>待处理</h3>
            <span class="count">5</span>
          </div>
          <div class="tasks">
            <div class="task-card">
              <div class="title">设计系统架构</div>
              <div class="meta">
                <span class="priority high">高</span>
                <span>张三</span>
              </div>
            </div>
            <div class="task-card">
              <div class="title">编写API文档</div>
              <div class="meta">
                <span class="priority medium">中</span>
                <span>李四</span>
              </div>
            </div>
            <div class="task-card">
              <div class="title">数据库设计</div>
              <div class="meta">
                <span class="priority high">高</span>
                <span>王五</span>
              </div>
            </div>
          </div>
        </div>

        <div class="column">
          <div class="column-header">
            <h3>进行中</h3>
            <span class="count">3</span>
          </div>
          <div class="tasks">
            <div class="task-card">
              <div class="title">前端页面开发</div>
              <div class="meta">
                <span class="priority medium">中</span>
                <span>张三</span>
              </div>
            </div>
            <div class="task-card">
              <div class="title">后端接口开发</div>
              <div class="meta">
                <span class="priority high">高</span>
                <span>李四</span>
              </div>
            </div>
          </div>
        </div>

        <div class="column">
          <div class="column-header">
            <h3>已完成</h3>
            <span class="count">4</span>
          </div>
          <div class="tasks">
            <div class="task-card">
              <div class="title">需求分析</div>
              <div class="meta">
                <span class="priority low">低</span>
                <span>王五</span>
              </div>
            </div>
            <div class="task-card">
              <div class="title">项目初始化</div>
              <div class="meta">
                <span class="priority medium">中</span>
                <span>张三</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2>新建任务</h2>
        <button onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>任务标题</label>
          <input type="text" placeholder="请输入任务标题" id="task-title">
        </div>
        <div class="form-group">
          <label>任务描述</label>
          <textarea placeholder="请输入任务描述" id="task-desc"></textarea>
        </div>
        <div class="form-group">
          <label>优先级</label>
          <select id="task-priority">
            <option value="high">高优先级</option>
            <option value="medium">中优先级</option>
            <option value="low">低优先级</option>
          </select>
        </div>
        <div class="form-group">
          <label>负责人</label>
          <select id="task-assignee">
            <option value="zhangsan">张三</option>
            <option value="lisi">李四</option>
            <option value="wangwu">王五</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="createTask()">创建任务</button>
      </div>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modal').classList.add('show');
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }
    function createTask() {
      const title = document.getElementById('task-title').value;
      if (!title.trim()) {
        alert('请输入任务标题');
        return;
      }
      alert('任务创建成功！\n\n标题: ' + title);
      closeModal();
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
    }
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) {
        closeModal();
      }
    });
  </script>
</body>
</html>
